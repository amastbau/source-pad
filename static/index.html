<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>source-pad</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app">
        <header>
            <h1>source-pad</h1>
            <div class="status">
                <span id="doc-count">...</span> docs indexed
                <button id="btn-index" title="Index a source">+ Index</button>
                <button id="btn-clear" title="Clear all">Clear</button>
                <button id="btn-toggle-trace" title="Toggle trace panel">Trace</button>
            </div>
        </header>

        <div class="main-layout">
            <div class="chat-area">
                <div class="chat" id="chat"></div>

                <div class="input-bar">
                    <textarea id="input" placeholder="Ask a question about your code..." rows="1"></textarea>
                    <button id="btn-send">Send</button>
                </div>
            </div>

            <div class="trace-panel" id="trace-panel">
                <div class="trace-header">
                    <span>Live Trace</span>
                    <button class="trace-btn" id="btn-clear-trace" title="Clear">Clear</button>
                </div>
                <div class="trace-content" id="trace-content">
                    <div class="trace-status" id="trace-status">Waiting for query...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Index dialog -->
    <dialog id="index-dialog">
        <h3>Index a source</h3>
        <div class="dialog-body">
            <label>
                <input type="radio" name="idx-type" value="github" checked> GitHub repo
            </label>
            <label>
                <input type="radio" name="idx-type" value="dir"> Local directory
            </label>
            <label>
                <input type="radio" name="idx-type" value="crawl"> Crawl URL
            </label>
            <input type="text" id="idx-input" placeholder="owner/repo (e.g. amastbau/hybrid-llm)">
            <div class="dialog-actions">
                <button id="idx-cancel">Cancel</button>
                <button id="idx-go">Index</button>
            </div>
        </div>
    </dialog>

    <script src="/static/app.js"></script>
</body>
</html>
